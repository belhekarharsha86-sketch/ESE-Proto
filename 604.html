<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Matched Sponsors</title>

  <style>
    body {
      font-family: 'Segoe UI';
      background: #f4f7fb;
      padding: 30px;
    }

    h1 {
      text-align: center;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .nav a {
      text-decoration: none;
      background: #2a5298;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
    }

    .event-box {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin: 20px auto;
      max-width: 500px;
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #4caf50;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="603.html">← Back</a>
  <a href="605.html">Next →</a>
</div>

<h1>🤝 Matched Sponsors</h1>

<!-- Selected Event -->
<div class="event-box" id="eventBox"></div>

<!-- Sponsors -->
<div class="container" id="sponsorContainer"></div>

<script>
  const events = JSON.parse(localStorage.getItem('events')) || [];
  const index = localStorage.getItem("selectedEventIndex");

  const selected = events[index];

  const sponsorContainer = document.getElementById("sponsorContainer");

  function accept() {
    alert("Sponsorship Accepted!");
    window.location.href = "605.html";
  }

  if (selected) {

    // SHOW EVENT
    document.getElementById('eventBox').innerHTML = `
      <h3>${selected.title}</h3>
      <p>🏫 ${selected.college}</p>
      <p>📌 Type: ${selected.type}</p>
      <p>👥 Audience: ${selected.audience}</p>
      <p>💰 ₹${selected.budget}</p>
    `;

    // FILTER SPONSORS BASED ON TYPE
    let html = "";

    if (selected.type === "Tech") {
      html += `
        <div class="card">
          <h3>Brand A</h3>
          <p>Tech Event Sponsor</p>
          <button onclick="accept()">Accept</button>
        </div>
      `;
    }

    if (selected.type === "Cultural") {
      html += `
        <div class="card">
          <h3>Brand B</h3>
          <p>Cultural Event Sponsor</p>
          <button onclick="accept()">Accept</button>
        </div>
      `;
    }

    if (selected.type === "Sports") {
      html += `
        <div class="card">
          <h3>Brand C</h3>
          <p>Sports Event Sponsor</p>
          <button onclick="accept()">Accept</button>
        </div>
      `;
    }

    sponsorContainer.innerHTML = html;

  } else {
    sponsorContainer.innerHTML = "<p>No event selected</p>";
  }
</script>

</body>
</html>
