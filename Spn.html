<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sponsor Dashboard</title>

  <style>
    body {
      font-family: 'Segoe UI';
      background: #f4f7fb;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .nav {
      margin-bottom: 20px;
    }

    .nav a {
      text-decoration: none;
      background: #2a5298;
      color: white;
      padding: 8px 15px;
      border-radius: 8px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #ccc;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #ff9800;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }

    button:disabled {
      background: gray;
    }
  </style>
</head>

<body>

<div class="nav">
  <a href="602.html">← Back</a>
</div>

<h1>💼 Sponsor Dashboard</h1>

<div class="container" id="eventList"></div>

<script>
  const events = JSON.parse(localStorage.getItem('events')) || [];
  const container = document.getElementById('eventList');

  if (events.length === 0) {
    container.innerHTML = "<p>No events available</p>";
  } else {
    events.forEach((e) => {
      container.innerHTML += `
        <div class="card">
          <h3>${e.title}</h3>
          <p>🏫 ${e.college}</p>
          <p>📌 ${e.type} | 📍 ${e.location}</p>
          <p>📅 ${e.date}</p>
          <p>👥 Audience: ${e.audience}</p>
          <p>💰 ₹${e.budget}</p>

          <button onclick="request(this)">Interested</button>
        </div>
      `;
    });
  }

  function request(btn) {
    btn.innerText = "Requested";
    btn.disabled = true;
  }
</script>

</body>
</html>
