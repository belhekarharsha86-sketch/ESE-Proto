<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Role</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #eef2f3, #dfe9f3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h2 {
      margin-bottom: 30px;
      color: #333;
      font-size: 32px;
      font-weight: 600;
    }

    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      width: 260px;
      padding: 30px;
      border-radius: 18px;
      background: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.2);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 15px;
    }

    h3 {
      margin-bottom: 10px;
        color: #222;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      border: none;
      background: #2a5298;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1e3c72;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 25px;
      text-decoration: none;
      color: #333;
      font-weight: bold;
    }

    .back:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <!-- Back Button -->
  <a href="index.html" class="back">← Back</a>

  <h2>Select Your Role</h2>

  <div class="container">

    <!-- College Card -->
    <div class="card">
      <div class="icon">🎓</div>
      <h3>College / Organizer</h3>
      <p>Create events and find sponsors</p>
      <button class="btn" onclick="goToCollege()">Continue</button>
    </div>

    <!-- Sponsor Card -->
    <div class="card">
      <div class="icon">💼</div>
      <h3>Sponsor / Brand</h3>
      <p>Explore and sponsor events</p>
      <button class="btn" onclick="goToSponsor()">Continue</button>
    </div>

  </div>

  <script>
    function goToCollege() {
      localStorage.setItem("role", "college"); // store role
      window.location.href = "login.html";
    }

    function goToSponsor() {
      localStorage.setItem("role", "sponsor"); // store role
      window.location.href = "login.html"; // sponsor directly sees events/sponsors
    }
  </script>

</body>
</html>
